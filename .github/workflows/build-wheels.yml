name: Build pymcu-avr-toolchain wheels

# Downloads the PlatformIO toolchain-atmelavr tarball for each platform and
# repackages it as a platform-specific Python wheel.  No compilation required.

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIO_VERSION: "3.70300.220127"
  PIO_BASE: "https://dl.registry.platformio.org/download/platformio/tool/toolchain-atmelavr/3.70300.220127"
  GCC_VERSION: "7.3.0"

jobs:
  # ---------------------------------------------------------------------------
  # All wheels are built on ubuntu-latest — we only download + repackage
  # pre-built binaries, so no native runner is needed per target platform.
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Build ${{ matrix.name }} wheel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            pio_tarball: toolchain-atmelavr-linux_x86_64-3.70300.220127.tar.gz
            wheel_tag: manylinux_2_17_x86_64
          - name: linux-arm64
            pio_tarball: toolchain-atmelavr-linux_aarch64-3.70300.220127.tar.gz
            wheel_tag: manylinux_2_17_aarch64
          - name: macos-arm64
            # macOS arm64 uses the x86_64 tarball — runs via Rosetta 2 on
            # Apple Silicon (same approach used by PlatformIO itself).
            pio_tarball: toolchain-atmelavr-darwin_x86_64-3.70300.220127.tar.gz
            wheel_tag: macosx_14_0_arm64
          - name: windows-x64
            pio_tarball: toolchain-atmelavr-windows-3.70300.220127.tar.gz
            wheel_tag: win_amd64
          - name: windows-arm64
            # Windows on Arm: same x64 binaries, wheel tagged win_arm64.
            # WoA x64 emulation is built into Windows 11 on Arm.
            pio_tarball: toolchain-atmelavr-windows-3.70300.220127.tar.gz
            wheel_tag: win_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download PlatformIO toolchain tarball
        run: |
          URL="${{ env.PIO_BASE }}/${{ matrix.pio_tarball }}"
          echo "Downloading: $URL"
          curl -fL "$URL" -o toolchain.tar.gz
          mkdir -p toolchain-staged
          tar xzf toolchain.tar.gz -C toolchain-staged
          echo "Toolchain layout:"
          ls -1 toolchain-staged/

      - name: Verify required binaries
        run: |
          EXE=""
          if [[ "${{ matrix.wheel_tag }}" == win* ]]; then EXE=".exe"; fi
          for bin in avr-gcc avr-as avr-objcopy; do
            test -f "toolchain-staged/bin/${bin}${EXE}" || \
              { echo "ERROR: missing toolchain-staged/bin/${bin}${EXE}"; exit 1; }
          done
          # Verify avr-libc is present
          test -f toolchain-staged/avr/lib/libm.a && echo "libm.a OK" || \
            echo "WARNING: libm.a not found"
          echo "All required binaries present."

      - uses: astral-sh/setup-uv@v6

      - name: Build wheel
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain-staged
          WHEEL_PLATFORM_TAG: ${{ matrix.wheel_tag }}
          AVRT_GCC_VERSION: ${{ env.GCC_VERSION }}
        run: uv build --wheel python/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: python/dist/*.whl

  # ---------------------------------------------------------------------------
  # Smoke test: install each wheel and verify the toolchain is functional.
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke test ${{ matrix.name }}
    needs: build-wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-arm64
            os: macos-latest
          - name: windows-x64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Install wheel and verify
        run: |
          pip install --no-index --find-links dist/ pymcu-avr-toolchain
          python -c "
          from pymcu_avr_toolchain import get_tool, toolchain_version
          gcc = get_tool('avr-gcc')
          print('avr-gcc:', gcc)
          print('version:', toolchain_version())
          import subprocess, sys
          r = subprocess.run([str(gcc), '--version'], capture_output=True, text=True)
          print(r.stdout.strip())
          assert '7.3.0' in r.stdout or '7.3.0' in r.stderr, 'unexpected version'
          print('Smoke test PASSED')
          "

  # ---------------------------------------------------------------------------
  # Publish to PyPI via OIDC trusted publishing.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/
      - name: List wheels
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all wheels attached.
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          prerelease: ${{ contains(github.ref, 'a') || contains(github.ref, 'b') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          body: |
            Pre-built AVR-GCC **7.3.0** toolchain wheels for PyMCU.

            Sourced from [PlatformIO toolchain-atmelavr](https://registry.platformio.org/packages/platformio/tool/toolchain-atmelavr) v3.70300.220127.
            Includes: avr-gcc, avr-g++, avr-as, avr-ld, avr-objcopy, avr-gdb, avr-libc.

            Visit [docs.pymcu.org](https://docs.pymcu.org) for installation instructions.
