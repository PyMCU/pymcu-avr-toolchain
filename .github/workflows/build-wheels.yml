name: Build pymcu-avr-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x64: build natively on ubuntu-latest (no Docker).
  # Uploads the Linux toolchain as an artifact so the Windows jobs can reuse it.
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Build Linux x64 toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: tarball-cache/
          key: avr-sources-v1-${{ hashFiles('avr-gcc-build.sh') }}
          restore-keys: avr-sources-v1-

      - name: Restore toolchain cache
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: linux-toolchain-staged/
          key: toolchain-linux-x64-v1-${{ hashFiles('avr-gcc-build.sh') }}

      - name: Set up wget cache wrapper
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tarball-cache
          mkdir -p /tmp/wget-wrap
          cat > /tmp/wget-wrap/wget << 'WRAPPER'
          #!/bin/bash
          URL=""
          for arg in "$@"; do
            case "$arg" in http*|ftp*) URL="$arg" ;; esac
          done
          FILE="$(basename "$URL")"
          CACHE_DIR="${GITHUB_WORKSPACE}/tarball-cache"
          if [ -n "$FILE" ] && [ -f "$CACHE_DIR/$FILE" ]; then
            echo "[wget-cache] Cache hit: $FILE"
            cp "$CACHE_DIR/$FILE" "$FILE"
          else
            /usr/bin/wget "$@"
            if [ -n "$FILE" ] && [ -f "$FILE" ]; then
              cp "$FILE" "$CACHE_DIR/" 2>/dev/null || true
            fi
          fi
          WRAPPER
          chmod +x /tmp/wget-wrap/wget
          echo "/tmp/wget-wrap" >> $GITHUB_PATH

      - name: Install build dependencies
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget make gcc g++ bzip2 xz-utils autoconf texinfo \
            libgmp-dev libmpfr-dev libexpat1-dev

      - name: Build Linux x64 AVR-GCC toolchain
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        env:
          FOR_LINUX: "1"
          FOR_WINX64: "0"
          JOBCOUNT: "4"
        run: bash avr-gcc-build.sh

      - name: Stage Linux toolchain for upload
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          LINUX_DIR=$(ls -d build/avr-gcc-*-x64-linux | head -1)
          cp -r "$LINUX_DIR" linux-toolchain-staged

      - name: Verify Linux toolchain
        run: |
          echo "Found: linux-toolchain-staged"
          linux-toolchain-staged/bin/avr-gcc --version

      - name: Upload Linux x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-linux-x64
          path: linux-toolchain-staged/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Windows x64: install pre-built AVR toolchain via MSYS2 MINGW64 packages.
  # Using pre-built packages mirrors the macOS Homebrew approach and avoids
  # the multi-hour from-source GCC build that reliably OOMs on the runner.
  # ---------------------------------------------------------------------------
  build-win-x64:
    name: Build Windows x64 toolchain
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: base-devel

      - name: Query AVR package version
        id: pkg-ver
        shell: msys2 {0}
        run: |
          VER=$(pacman -Si mingw-w64-x86_64-avr-gcc | awk '/^Version/ {print $3; exit}')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "AVR-GCC package version: $VER"

      - name: Restore toolchain cache
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: win-x64-toolchain-staged/
          key: toolchain-win-x64-v1-${{ steps.pkg-ver.outputs.ver }}

      - name: Install AVR toolchain packages
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: pacman -S --noconfirm mingw-w64-x86_64-avr-gcc mingw-w64-x86_64-avr-libc mingw-w64-x86_64-avr-binutils

      - name: Locate x64 toolchain binaries
        id: locate-win-x64
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          BIN_DIR=/mingw64/bin
          echo "bin_dir=$BIN_DIR" >> $GITHUB_OUTPUT
          echo "Found x64 avr-gcc at: $BIN_DIR/avr-gcc.exe"
          "$BIN_DIR/avr-gcc.exe" --version

      - name: Assemble x64 toolchain directory
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          mkdir -p win-x64-toolchain-staged/bin
          BIN_DIR=/mingw64/bin
          for bin in avr-gcc avr-g++ avr-as avr-ld avr-ar avr-objcopy avr-objdump avr-size avr-nm avr-strip avr-ranlib avr-strings; do
            if [ -f "$BIN_DIR/${bin}.exe" ]; then
              cp "$BIN_DIR/${bin}.exe" win-x64-toolchain-staged/bin/
              echo "Copied: ${bin}.exe"
            else
              echo "Not found (skipped): ${bin}.exe"
            fi
          done
          SYSROOT=/mingw64/avr
          if [ -d "$SYSROOT" ]; then
            cp -r "$SYSROOT" win-x64-toolchain-staged/avr
          fi

      - name: Verify x64 toolchain
        shell: msys2 {0}
        run: |
          # Check the three binaries required by hatch_build.py (_REQUIRED_BINS).
          for bin in avr-gcc.exe avr-as.exe avr-objcopy.exe; do
            test -f win-x64-toolchain-staged/bin/$bin || (echo "MISSING: $bin" && exit 1)
          done
          echo "x64 toolchain OK"

      - name: Upload Windows x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-win-x64
          path: win-x64-toolchain-staged/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — ZakKemble self-contained pre-built release
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: Download macOS arm64 toolchain (ZakKemble)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download ZakKemble macOS arm64 toolchain
        run: |
          VER="${VER_GCC:-15.2.0}"
          TAG="v${VER}-1"
          URL="https://github.com/ZakKemble/avr-gcc-build/releases/download/${TAG}/avr-gcc-${VER}-arm64-macos.tar.bz2"
          echo "Downloading: $URL"
          mkdir -p output
          wget -q "$URL" -O toolchain.tar.bz2
          tar -xjf toolchain.tar.bz2 -C output/
          echo "Extracted: $(ls output/)"

      - name: Verify toolchain
        run: |
          BIN=$(ls output/avr-gcc-*/bin/avr-gcc | head -1)
          echo "avr-gcc: $BIN"
          file "$BIN"

      - name: Upload macOS arm64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: output/avr-gcc-*/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS x86_64 — ZakKemble self-contained pre-built release
  # ---------------------------------------------------------------------------
  build-macos-x64:
    name: Download macOS x64 toolchain (ZakKemble)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download ZakKemble macOS x64 toolchain
        run: |
          VER="${VER_GCC:-15.2.0}"
          TAG="v${VER}-1"
          URL="https://github.com/ZakKemble/avr-gcc-build/releases/download/${TAG}/avr-gcc-${VER}-x64-macos.tar.bz2"
          echo "Downloading: $URL"
          mkdir -p output
          wget -q "$URL" -O toolchain.tar.bz2
          tar -xjf toolchain.tar.bz2 -C output/
          echo "Extracted: $(ls output/)"

      - name: Verify toolchain
        run: |
          BIN=$(ls output/avr-gcc-*/bin/avr-gcc | head -1)
          echo "avr-gcc: $BIN"
          file "$BIN"

      - name: Upload macOS x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-x64
          path: output/avr-gcc-*/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Package wheels (one job per platform, all run in parallel)
  # ---------------------------------------------------------------------------
  package-linux-x64:
    name: Package Linux x64 wheel
    needs: build-linux-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-linux-x64
          path: toolchain/
      - name: Verify toolchain artifact
        run: |
          echo "Contents of toolchain/:"
          find toolchain/ -maxdepth 2 | head -20
          test -d toolchain/bin || (echo "ERROR: toolchain/bin missing" && exit 1)
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: manylinux_2_17_x86_64
        run: uv build --wheel python/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x64
          path: python/dist/*.whl

  package-win-x64:
    name: Package Windows x64 wheel
    needs: build-win-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-win-x64
          path: toolchain/
      - name: Verify toolchain artifact
        run: |
          echo "Contents of toolchain/:"
          find toolchain/ -maxdepth 2 | head -20
          test -d toolchain/bin || (echo "ERROR: toolchain/bin missing" && exit 1)
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: win_amd64
        run: uv build --wheel python/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-x64
          path: python/dist/*.whl

  package-macos-arm64:
    name: Package macOS arm64 wheel
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: toolchain-root/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Resolve toolchain directory
        id: resolve
        run: |
          # ZakKemble tarballs extract to a versioned subdirectory.
          DIR=$(ls -d toolchain-root/avr-gcc-* 2>/dev/null | head -1 || echo "toolchain-root")
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Toolchain dir: $DIR"
          ls "$DIR/bin/"
      - name: Build wheel
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/${{ steps.resolve.outputs.dir }}
          WHEEL_PLATFORM_TAG: macosx_14_0_arm64
        run: uv build --wheel python/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: python/dist/*.whl

  package-macos-x64:
    name: Package macOS x86_64 wheel
    needs: build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-x64
          path: toolchain-root/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Resolve toolchain directory
        id: resolve
        run: |
          DIR=$(ls -d toolchain-root/avr-gcc-* 2>/dev/null | head -1 || echo "toolchain-root")
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Toolchain dir: $DIR"
          ls "$DIR/bin/"
      - name: Build wheel
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/${{ steps.resolve.outputs.dir }}
          WHEEL_PLATFORM_TAG: macosx_13_0_x86_64
        run: uv build --wheel python/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x64
          path: python/dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect, build sdist, smoke-test, and release
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and create release
    needs:
      - package-linux-x64
      - package-win-x64
      - package-macos-arm64
      - package-macos-x64
    runs-on: ubuntu-latest
    permissions:
      # NOTE: Change to 'contents: write' when re-enabling GitHub Release creation.
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        run: uv build --sdist python/

      - name: Move sdist to dist/
        run: mv python/dist/*.tar.gz dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 1

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_avr_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_avr_toolchain
          bin_dir = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {bin_dir}')
          assert bin_dir.exists(), f'bin_dir does not exist: {bin_dir}'
          avr_gcc = bin_dir / 'avr-gcc'
          assert avr_gcc.exists(), f'avr-gcc not found: {avr_gcc}'
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

      # GitHub Release and public PyPI publishing are intentionally disabled.
      # Enable once the package is ready for public distribution.
      # - name: Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: dist/*

  # ---------------------------------------------------------------------------
  # Publish to public PyPI (only on tag or release)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/*

  # ---------------------------------------------------------------------------
  # Publish to private PyPI index via headscale
  # ---------------------------------------------------------------------------
  publish-private:
    name: Publish to private PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Connect to headscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          args: --login-server ${{ secrets.HEADSCALE_URL }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to private registry (Gitea)
        run: |
          uv publish \
            --publish-url "${{ secrets.PRIVATE_PYPI_URL }}" \
            --username "${{ secrets.PRIVATE_PYPI_USERNAME }}" \
            --password "${{ secrets.PRIVATE_PYPI_TOKEN }}" \
            dist/*
