name: Toolchain smoke test

# Validates that the published pymcu-avr-toolchain wheel works correctly
# on all target platforms.
#
# NOTE: `release: published` does NOT work when the release is created by a
# workflow using GITHUB_TOKEN (GitHub blocks recursive workflow triggering).
# Instead, we trigger via `workflow_run` after build-wheels.yml completes.

on:
  # Runs after the wheel-build workflow succeeds (tag-triggered builds only).
  workflow_run:
    workflows: ["Build pymcu-avr-toolchain wheels"]
    types: [completed]
  # Also runs manually for ad-hoc validation.
  workflow_dispatch:
    inputs:
      version:
        description: "pymcu-avr-toolchain version to test (default: latest)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # For workflow_run: only run when the upstream workflow succeeded AND
    # was triggered by a tag push (not a master cache-warming push).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pymcu-avr-toolchain (PyPI sdist + auto-download wheel)
        run: |
          uv venv .venv
          uv pip install --python .venv pymcu-avr-toolchain pytest

      - name: Pre-seed toolchain (triggers download + chmod + symlinks)
        shell: bash
        run: |
          uv run --python .venv python -c "
          import pymcu_avr_toolchain
          d = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {d}')
          "

      - name: Run smoke tests
        run: uv run --python .venv pytest python/tests/ -v --tb=short
