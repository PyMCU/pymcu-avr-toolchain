name: Toolchain smoke test

# Validates that the published pymcu-avr-toolchain wheel works correctly
# on all target platforms. Installs the binary wheel directly from GitHub
# Releases so the full supply-chain pipeline tests have real tools.
#
# NOTE: `release: published` does NOT work when the release is created by a
# workflow using GITHUB_TOKEN. Use `workflow_run` after build-wheels.yml.

on:
  workflow_run:
    workflows: ["Build pymcu-avr-toolchain wheels"]
    types: [completed]
  push:
    branches: [master, main]
    paths:
      - "python/src/**"
      - "python/tests/**"
      - ".github/workflows/smoke-test.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to test (e.g. v15.2.0.post15, default: latest release)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # For workflow_run: only run after a tag-triggered successful build
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            wheel_tag: manylinux_2_17_x86_64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            wheel_tag: manylinux_2_17_aarch64
          - name: macos-arm64
            os: macos-latest
            wheel_tag: macosx_14_0_arm64
          - name: windows-x64
            os: windows-latest
            wheel_tag: win_amd64
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXPLICIT="${{ github.event.inputs.version }}"
          RUN_BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ -n "$EXPLICIT" ]]; then
            TAG="$EXPLICIT"
          elif [[ "$RUN_BRANCH" =~ ^v ]]; then
            TAG="$RUN_BRANCH"
          else
            TAG=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Install binary wheel from GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VER="${TAG#v}"
          REPO="$GITHUB_REPOSITORY"
          WHEEL_TAG="${{ matrix.wheel_tag }}"
          WHEEL="pymcu_avr_toolchain-${VER}-py3-none-${WHEEL_TAG}.whl"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${WHEEL}"
          echo "Installing: $URL"
          uv venv .venv
          uv pip install --python .venv "$URL" pytest
          uv run --python .venv python -c "
          from importlib.metadata import version
          print('Installed:', version('pymcu-avr-toolchain'))
          "

      - name: Seed toolchain cache (chmod + symlinks)
        shell: bash
        run: |
          uv run --python .venv python -c "
          import pymcu_avr_toolchain
          d = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {d}')
          "

      - name: Run smoke tests
        run: uv run --python .venv pytest python/tests/ -v --tb=short
