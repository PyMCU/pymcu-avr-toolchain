name: Toolchain smoke test

# Validates that the published pymcu-avr-toolchain wheel works correctly
# on all target platforms.
#
# NOTE: `release: published` does NOT work when the release is created by a
# workflow using GITHUB_TOKEN (GitHub blocks recursive workflow triggering).
# Instead, we trigger via `workflow_run` after build-wheels.yml completes.

on:
  # Runs after the wheel-build workflow succeeds (tag-triggered builds only).
  workflow_run:
    workflows: ["Build pymcu-avr-toolchain wheels"]
    types: [completed]
  # Also runs manually for ad-hoc validation.
  workflow_dispatch:
    inputs:
      version:
        description: "pymcu-avr-toolchain version to test (default: latest)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # For workflow_run: only run when the upstream workflow succeeded AND
    # was triggered by a tag push (not a master cache-warming push).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          # Disable uv's package cache so we always install the freshly published
          # version from PyPI, not a stale cached copy from a previous CI run.
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve target version
        id: version
        shell: bash
        run: |
          # For workflow_run, pin to the exact tag that triggered the build so
          # we don't race PyPI CDN propagation. head_branch is the tag name.
          TAG="${{ github.event.workflow_run.head_branch }}"
          if [[ "$TAG" =~ ^v(.+)$ ]]; then
            echo "pin=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "pin=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pymcu-avr-toolchain (PyPI sdist + auto-download wheel)
        shell: bash
        run: |
          uv venv .venv
          PIN="${{ steps.version.outputs.pin }}"
          if [ -n "$PIN" ]; then
            SPEC="pymcu-avr-toolchain==$PIN"
          else
            SPEC="pymcu-avr-toolchain"
          fi
          echo "Installing: $SPEC"
          # Retry up to 3 times to handle transient PyPI propagation delays
          for i in 1 2 3; do
            uv pip install --python .venv "$SPEC" pytest && break
            echo "Attempt $i failed — waiting 30s for PyPI to propagate..."
            sleep 30
          done
          uv run --python .venv python -c "
          from importlib.metadata import version
          print('Installed version:', version('pymcu-avr-toolchain'))
          "

      - name: Pre-seed toolchain (triggers download + chmod + symlinks)
        shell: bash
        run: |
          uv run --python .venv python -c "
          import pymcu_avr_toolchain
          d = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {d}')
          "

      - name: Run smoke tests
        run: uv run --python .venv pytest python/tests/ -v --tb=short
